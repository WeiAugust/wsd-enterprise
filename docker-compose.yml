# WSD All — 本地 Docker 部署
# 使用方式：docker compose up -d
# Web UI：http://localhost:3030
# API：  http://localhost:3030/api

services:
  # ── WSD Manager API + Web UI ────────────────────────────────────────────────
  wsd-manager:
    build:
      context: ./wsd_manager
      dockerfile: Dockerfile
    image: wsd-manager:latest
    container_name: wsd-manager
    restart: unless-stopped
    ports:
      - "${WSD_PORT:-3030}:3030"
    environment:
      - NODE_ENV=production
      - PORT=3030
      - WSD_DATA_DIR=/data
      - AUTH_TOKEN=${AUTH_TOKEN:-}          # 留空则无鉴权（本地开发）
    volumes:
      # 持久化需求数据和审计日志
      - wsd-data:/data
      # 挂载注册中心（方便直接编辑资产文件）
      - ./wsd_manager/registry:/app/registry:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3030/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - wsd-net

  # ── Nginx 反向代理（可选，生产环境推荐）──────────────────────────────────────
  # nginx:
  #   image: nginx:alpine
  #   container_name: wsd-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./docker/certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - wsd-manager
  #   networks:
  #     - wsd-net

volumes:
  wsd-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${WSD_DATA_PATH:-./wsd-data}

networks:
  wsd-net:
    driver: bridge
